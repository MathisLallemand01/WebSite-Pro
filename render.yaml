services:
  - type: web
    name: site-perso
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm ls nodemailer && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CORS_ORIGIN
        value: https://www.mathislallemand.fr,https://mathislallemand.fr
      - key: MAX_BODY_SIZE
        value: "100000"
      - key: REQUEST_TIMEOUT_MS
        value: "10000"
      - key: CONTACT_SMTP_TIMEOUT_MS
        value: "8500"
      - key: CONTACT_HANDLER_TIMEOUT_MS
        value: "9000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: RATE_LIMIT_MAX_POSTS
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_REVIEWS_TABLE
        value: reviews
      - key: SUPABASE_SCHEMA
        value: public
      - key: SUPABASE_TIMEOUT_MS
        value: "8000"
      - key: CONTACT_TO_EMAIL
        value: mathis.lallemmand2@gmail.com
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: CONTACT_BACKUP_PATH
        value: /var/data/failed-contact-requests.ndjson
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_FALLBACK_ENABLED
        value: "true"
      - key: SMTP_FALLBACK_PORT
        value: "587"
      - key: SMTP_FALLBACK_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_TRANSPORT
        value: "auto"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
    disk:
      name: reviews-data
      mountPath: /var/data
      sizeGB: 1
